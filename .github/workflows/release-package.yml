
name: Release Package

on:
  push:
    tags:
      - 'release*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
        contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependency
        run: pipenv install --dev
      - name: Create tarball
        run: tar czf ../kalkulatorterry-${{ github.ref_name }}.tar.gz .
      - name: Upload to github release
        uses: softprops/action-gh-release@v2
        with:
          files: ../kalkulatorterry-${{ github.ref_name }}.tar.gz
