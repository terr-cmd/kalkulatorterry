name: Calculator apps work flow 

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    - name: Install pipenv
      run: pip install pipenv
    - name: Install dependency
      run: pipenv install --dev

    - name: Run test
      run: pipenv run pytest